<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 粒子变形特效</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }

        /* 顶部状态栏 */
        #status-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            z-index: 10;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* 底部控制面板 */
        #controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        button {
            background: #23395d;
            color: white;
            border: 1px solid #4a6fa5;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        button:hover {
            background: #3a5a8f;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        .color-picker {
            display: flex;
            gap: 15px;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: transform 0.2s;
        }

        .color-dot:hover {
            transform: scale(1.2);
        }

        .orange { background: linear-gradient(to bottom right, #ffcc33, #ff6600); }
        .green  { background: linear-gradient(to bottom right, #a8ff78, #08ffc8); }
        .purple { background: linear-gradient(to bottom right, #8e2de2, #4a00e0); }
        .rainbow { background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet); }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="status-bar">Shape: Sphere (Click to morph)</div>

    <div id="controls">
        <button id="change-shape">Change Shape</button>
        <div class="color-picker">
            <div class="color-dot orange" data-color="0xffaa33"></div>
            <div class="color-dot green" data-color="0x44ffaa"></div>
            <div class="color-dot purple" data-color="0xaa44ff"></div>
            <div class="color-dot rainbow" data-color="rainbow"></div>
        </div>
    </div>

    <!-- 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 配置 ---
        const PARTICLE_COUNT = 15000;
        const shapes = ['Sphere', 'Cube', 'Pyramid', 'Torus', 'Galaxy', 'Wave'];
        let currentShapeIndex = 0;
        let isMorphing = false;
        let colorMode = 'orange';

        // --- 核心变量 ---
        let scene, camera, renderer, particles;
        let positions = []; // 存储各个形状的点位
        let currentPositions; // BufferAttribute

        init();
        animate();

        function init() {
            // 场景
            scene = new THREE.Scene();
            
            // 相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 创建所有形状的数据
            createShapes();

            // 初始粒子系统
            const geometry = new THREE.BufferGeometry();
            currentPositions = new THREE.Float32BufferAttribute(positions[0], 3);
            geometry.setAttribute('position', currentPositions);

            // 粒子材质
            const material = new THREE.PointsMaterial({
                size: 0.015,
                color: 0xffaa33,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // 事件监听
            window.addEventListener('resize', onWindowResize);
            document.getElementById('change-shape').addEventListener('click', transitionToNextShape);
            
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.addEventListener('click', (e) => {
                    const color = e.target.dataset.color;
                    if(color === 'rainbow') {
                        colorMode = 'rainbow';
                    } else {
                        colorMode = 'solid';
                        particles.material.color.setHex(parseInt(color));
                    }
                });
            });
        }

        function createShapes() {
            // 1. Sphere (球体)
            const spherePos = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                spherePos.push(
                    2 * Math.cos(theta) * Math.sin(phi),
                    2 * Math.sin(theta) * Math.sin(phi),
                    2 * Math.cos(phi)
                );
            }
            positions.push(spherePos);

            // 2. Cube (立方体)
            const cubePos = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                cubePos.push(
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 3
                );
            }
            positions.push(cubePos);

            // 3. Pyramid (金字塔/圆锥)
            const pyramidPos = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const r = Math.random() * 2;
                const theta = Math.random() * 2 * Math.PI;
                const h = Math.random() * 3;
                const currentR = r * (1 - h/3);
                pyramidPos.push(
                    currentR * Math.cos(theta),
                    h - 1.5,
                    currentR * Math.sin(theta)
                );
            }
            positions.push(pyramidPos);

            // 4. Torus (圆环)
            const torusPos = [];
            const R = 2, r = 0.6;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const u = Math.random() * 2 * Math.PI;
                const v = Math.random() * 2 * Math.PI;
                torusPos.push(
                    (R + r * Math.cos(v)) * Math.cos(u),
                    (R + r * Math.cos(v)) * Math.sin(u),
                    r * Math.sin(v)
                );
            }
            positions.push(torusPos);

            // 5. Galaxy (银河系)
            const galaxyPos = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const angle = Math.random() * Math.PI * 10;
                const radius = Math.random() * 2.5 + 0.2;
                const spiral = angle * 0.2;
                galaxyPos.push(
                    Math.cos(angle + radius) * radius,
                    (Math.random() - 0.5) * 0.2,
                    Math.sin(angle + radius) * radius
                );
            }
            positions.push(galaxyPos);

            // 6. Wave (波浪)
            const wavePos = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const x = (Math.random() - 0.5) * 6;
                const z = (Math.random() - 0.5) * 6;
                const y = Math.sin(x * 2) * Math.cos(z * 2) * 0.5;
                wavePos.push(x, y, z);
            }
            positions.push(wavePos);
        }

        function transitionToNextShape() {
            if (isMorphing) return;
            
            isMorphing = true;
            const statusBar = document.getElementById('status-bar');
            statusBar.innerText = "Morphing...";

            const nextIndex = (currentShapeIndex + 1) % shapes.length;
            const targetPos = positions[nextIndex];
            const startPos = Array.from(currentPositions.array);

            let progress = 0;
            const duration = 60; // 帧数

            function step() {
                progress++;
                const t = progress / duration;
                // 使用 Ease-in-out 平滑函数
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

                for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                    currentPositions.array[i] = startPos[i] + (targetPos[i] - startPos[i]) * ease;
                }
                currentPositions.needsUpdate = true;

                if (progress < duration) {
                    requestAnimationFrame(step);
                } else {
                    currentShapeIndex = nextIndex;
                    isMorphing = false;
                    statusBar.innerText = `Shape: ${shapes[currentShapeIndex]} (Click to morph)`;
                }
            }
            step();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 缓慢旋转场景
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;

            // 彩虹模式
            if(colorMode === 'rainbow') {
                const time = Date.now() * 0.001;
                particles.material.color.setHSL(time % 1, 0.7, 0.6);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
