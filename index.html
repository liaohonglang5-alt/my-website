<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 粒子交互特效</title>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', sans-serif; color: white; user-select: none;
        }
        #status-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(8px);
            z-index: 10; pointer-events: none; font-size: 13px; text-transform: uppercase;
        }
        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10;
        }
        button {
            background: #1a2a44; color: white; border: 1px solid #3a5a8f;
            padding: 10px 25px; font-size: 16px; border-radius: 5px; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        button:hover { background: #2b4570; border-color: #44ffaa; }
        .color-picker { display: flex; gap: 12px; }
        .color-dot {
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.5); transition: transform 0.2s, border-color 0.2s;
        }
        .color-dot:hover { transform: scale(1.1); border-color: white; }
        .orange { background: #ffaa33; }
        .green  { background: #44ffaa; }
        .purple { background: #aa44ff; }
        .rainbow { background: linear-gradient(45deg, red, yellow, blue, magenta); }
        canvas { display: block; }
        #hint {
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            font-size: 10px; color: rgba(255,255,255,0.4); pointer-events: none;
        }
        @media (max-width: 768px) {
            #status-bar { font-size: 11px; padding: 6px 14px; top: 12px; }
            button { font-size: 14px; padding: 8px 20px; }
            .color-dot { width: 24px; height: 24px; }
            #controls { bottom: 20px; gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="status-bar">Shape: Sphere</div>
    <div id="hint">鼠标左键旋转 | 滚轮缩放 | 右键平移</div>

    <div id="controls">
        <button id="change-shape">Change Shape</button>
        <div class="color-picker">
            <div class="color-dot orange" data-color="0xffaa33"></div>
            <div class="color-dot green" data-color="0x44ffaa"></div>
            <div class="color-dot purple" data-color="0xaa44ff"></div>
            <div class="color-dot rainbow" data-color="rainbow"></div>
        </div>
    </div>

    <!-- 本地加载 Three.js r128 (UMD 格式，无需网络) -->
    <script src="lib/three.min.js"></script>
    <script src="lib/OrbitControls.js"></script>

    <script>
    (function(){
        var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) document.getElementById('hint').innerText = '滑动旋转 | 双指缩放 | 拖动平移';

        var PARTICLE_COUNT = isMobile ? 8000 : 15000;
        var shapes = ['Sphere', 'Cube', 'Pyramid', 'Torus', 'Galaxy', 'Wave'];
        var currentShapeIndex = 0;
        var isMorphing = false;
        var colorMode = 'solid';

        var scene, camera, renderer, particles, controls;
        var positions = [];
        var currentPositions;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            createShapes();

            var geometry = new THREE.BufferGeometry();
            currentPositions = new THREE.BufferAttribute(new Float32Array(positions[0]), 3);
            geometry.setAttribute('position', currentPositions);

            var material = new THREE.PointsMaterial({
                size: 0.02,
                color: 0xffaa33,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('change-shape').addEventListener('click', transitionToNextShape);

            document.querySelectorAll('.color-dot').forEach(function(dot) {
                dot.addEventListener('click', function(e) {
                    var color = e.target.dataset.color;
                    if (color === 'rainbow') {
                        colorMode = 'rainbow';
                    } else {
                        colorMode = 'solid';
                        particles.material.color.setHex(parseInt(color));
                    }
                });
            });
        }

        function createShapes() {
            // 球体
            var spherePos = [];
            for (var i = 0; i < PARTICLE_COUNT; i++) {
                var phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                var theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                spherePos.push(2.5 * Math.cos(theta) * Math.sin(phi), 2.5 * Math.sin(theta) * Math.sin(phi), 2.5 * Math.cos(phi));
            }
            positions.push(spherePos);

            // 立方体
            var cubePos = [];
            for (var i = 0; i < PARTICLE_COUNT; i++) {
                cubePos.push((Math.random()-0.5)*3.5, (Math.random()-0.5)*3.5, (Math.random()-0.5)*3.5);
            }
            positions.push(cubePos);

            // 金字塔
            var pyramidPos = [];
            for (var i = 0; i < PARTICLE_COUNT; i++) {
                var h = Math.random() * 4;
                var r = (h / 4) * 2;
                var theta = Math.random() * Math.PI * 2;
                pyramidPos.push(r * Math.cos(theta), h - 2, r * Math.sin(theta));
            }
            positions.push(pyramidPos);

            // 圆环
            var torusPos = [];
            for (var i = 0; i < PARTICLE_COUNT; i++) {
                var u = Math.random() * Math.PI * 2, v = Math.random() * Math.PI * 2;
                torusPos.push((2.2 + 0.7 * Math.cos(v)) * Math.cos(u), (2.2 + 0.7 * Math.cos(v)) * Math.sin(u), 0.7 * Math.sin(v));
            }
            positions.push(torusPos);

            // 银河
            var galaxyPos = [];
            for (var i = 0; i < PARTICLE_COUNT; i++) {
                var angle = Math.random() * Math.PI * 8;
                var radius = Math.random() * 3;
                galaxyPos.push(Math.cos(angle + radius) * radius, (Math.random() - 0.5) * 0.3, Math.sin(angle + radius) * radius);
            }
            positions.push(galaxyPos);

            // 波浪
            var wavePos = [];
            for (var i = 0; i < PARTICLE_COUNT; i++) {
                var x = (Math.random() - 0.5) * 7, z = (Math.random() - 0.5) * 7;
                var y = Math.sin(x) * Math.cos(z) * 0.8;
                wavePos.push(x, y, z);
            }
            positions.push(wavePos);
        }

        function transitionToNextShape() {
            if (isMorphing) return;
            isMorphing = true;
            document.getElementById('status-bar').innerText = "Morphing...";

            var nextIndex = (currentShapeIndex + 1) % shapes.length;
            var targetPos = positions[nextIndex];
            var startPos = Array.from(currentPositions.array);

            var progress = 0;
            var duration = 50;

            function step() {
                progress++;
                var t = progress / duration;
                var ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

                for (var i = 0; i < PARTICLE_COUNT * 3; i++) {
                    currentPositions.array[i] = startPos[i] + (targetPos[i] - startPos[i]) * ease;
                }
                currentPositions.needsUpdate = true;

                if (progress < duration) {
                    requestAnimationFrame(step);
                } else {
                    currentShapeIndex = nextIndex;
                    isMorphing = false;
                    document.getElementById('status-bar').innerText = 'Shape: ' + shapes[currentShapeIndex];
                }
            }
            step();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (colorMode === 'rainbow') {
                var time = Date.now() * 0.001;
                particles.material.color.setHSL(time % 1, 0.7, 0.6);
            }

            renderer.render(scene, camera);
        }
    })();
    </script>
</body>
</html>
